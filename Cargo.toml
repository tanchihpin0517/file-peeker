[workspace]
members = [
    "crates/file-peeker-client",
    "crates/file-peeker-host",
    "crates/file-peeker-protocol",
    "crates/file-peeker-tui",
    "tools/uniffi-bindgen",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
license = "Apache-2.0"

[workspace.dependencies]
ratatui = "0.30.0"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
thiserror = "2.0.12"
tokio = { version = "1.52.4", features = ["macros", "rt-multi-thread"] }
uniffi = "=0.31.2"

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
all = "warn"
pedantic = "warn"
