syntax = "proto3";

package file_peeker.v1;

service FilePeeker {
  rpc ResolvePath(ResolvePathRequest) returns (ResolvePathResponse);
  rpc List(ListRequest) returns (stream ListBatch);
  rpc Walk(WalkRequest) returns (stream WalkBatch);
  rpc Read(ReadRequest) returns (stream ReadChunk);
}

message ResolvePathRequest {
  string path = 1;
}

message ResolvePathResponse {
  string path = 1;
}

message ListRequest {
  string path = 1;
}

message WalkRequest {
  string path = 1;
}

message ReadRequest {
  string path = 1;
}

message ReadChunk {
  bytes data = 1;
}

message ListBatch {
  repeated ListingEntry entries = 1;
}

message WalkBatch {
  repeated WalkEntry entries = 1;
}

message WalkEntry {
  string relative_path = 1;
  ListingEntry entry = 2;
  uint64 depth = 3;
}

message ListingEntry {
  string name = 1;
  EntryKind kind = 2;
  bool navigable = 3;
}

enum EntryKind {
  ENTRY_KIND_UNSPECIFIED = 0;
  ENTRY_KIND_FILE = 1;
  ENTRY_KIND_DIRECTORY = 2;
  ENTRY_KIND_SYMLINK = 3;
  ENTRY_KIND_OTHER = 4;
}
