name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Verify workspace and bindings
        run: make verify

